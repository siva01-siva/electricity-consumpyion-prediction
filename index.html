<!DOCTYPE html>
<html>
<head>
    <title>Electricity Consumption Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Electricity Consumption Prediction</h1>

    <form method="POST">

        <label>Temperature (°C)</label><br>
        <input type="number" name="temperature" required><br><br>

        <label>Humidity (%)</label><br>
        <input type="number" name="humidity" required><br><br>

        <label>Hour (0-23)</label><br>
        <input type="number" name="hour" required><br><br>

        <button type="submit">Predict</button>

    </form>

    {% if prediction %}
        <h2>Predicted Consumption: {{ prediction }} kWh</h2>
    {% endif %}

</div>

</body>
</html>
